name: Instagram Automation
on:
  schedule:
    # Comments → every 3 hours IST (00,03,06,09,12,15,18,21 IST = 18:30,21:30,00:30,03:30... prev day UTC)
    # Easiest: run at UTC 18,21,0,3,6,9,12,15 (= IST 23:30,2:30,5:30,8:30,11:30,14:30,17:30,20:30)
    # Better approach: fix cron to exact IST hours minus 5:30
    - cron: '30 18,21,0,3,6,9,12,15 * * *'  # = IST 00,03,06,09,12,15,18,21
    # Feed Image → IST 01:00 & 13:00 = UTC 19:30 & 07:30
    - cron: '30 19,7 * * *'
    # Story Image → IST 02:00 = UTC 20:30
    - cron: '30 20 * * *'
    # Story Video → 1st of month IST 03:00 = UTC 21:30
    - cron: '30 21 1 * *'
  workflow_dispatch:

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger APIs
        env:
          BASE_URL: "https://instagram-automation-g7b4.onrender.com"
        run: |
          set -euo pipefail
          IST_HOUR=$(TZ="Asia/Kolkata" date +%H)
          IST_MIN=$(TZ="Asia/Kolkata" date +%M)
          IST_DAY=$(TZ="Asia/Kolkata" date +%d)
          echo "IST Time -> Day: $IST_DAY | Hour: $IST_HOUR | Min: $IST_MIN"

          call_api_with_retry() {
            local endpoint="$1"
            local name="$2"
            local max=3
            local attempt=1
            local status
            echo ">>> Running: $name"
            while [ $attempt -le $max ]; do
              echo "Attempt $attempt..."
              status=$(curl -s -w "%{http_code}" -o /dev/null -m 300 "$endpoint")
              echo "Status: $status"
              if [ "$status" = "200" ]; then
                echo "✅ $name SUCCESS"
                return 0
              fi
              echo "❌ Failed attempt $attempt"
              sleep 60
              attempt=$((attempt+1))
            done
            echo "🚨 $name FAILED"
            return 1
          }

          # Story Video (1st of month, IST 03:xx)
          if [ "$IST_DAY" = "01" ] && [ "$IST_HOUR" = "03" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/video" "Story Video"
          fi

          # Comments (IST 00,03,06,09,12,15,18,21)
          if [[ "$IST_HOUR" =~ ^(00|03|06|09|12|15|18|21)$ ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/comments" "Comments"
          fi

          # Feed Image (IST 01 or 13)
          if [[ "$IST_HOUR" = "01" || "$IST_HOUR" = "13" ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/feed/image" "Feed Image"
          fi

          # Story Image (IST 02)
          if [ "$IST_HOUR" = "02" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/image" "Story Image"
          fi

          echo "Job Complete"
