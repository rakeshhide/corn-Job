name: Instagram Automation

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
    - cron: '0 */6 * * *'   # every 6 hours
    - cron: '0 0 * * *'     # daily
    - cron: '0 0 * * 0'     # weekly
    - cron: '0 0 1 * *'     # monthly
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Run automation
        run: |
          echo "Starting job..."

          HOUR=$(date -u +%H)
          DAY=$(date -u +%d)
          WEEKDAY=$(date -u +%u)

          echo "UTC Hour: $HOUR | Day: $DAY | Weekday: $WEEKDAY"

          BASE_URL="https://instagram-automation-g7b4.onrender.com"

          call_api () {
            URL=$1
            NAME=$2

            for i in 1 2 3; do
              echo "Attempt $i for $NAME"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -m 300 $URL)

              if [ "$STATUS" = "200" ]; then
                echo "✅ $NAME success"
                return
              fi

              echo "Retrying..."
              sleep 60
            done

            echo "❌ $NAME failed"
          }

          # COMMENTS every 3 hours
          if [ $((10#$HOUR % 3)) -eq 0 ]; then
            call_api "$BASE_URL/api/v1/trigger/comments" "Comments"
          fi

          # FEED every 6 hours
          if [ $((10#$HOUR % 6)) -eq 0 ]; then
            call_api "$BASE_URL/api/v1/trigger/feed/image" "Feed"
          fi

          # STORY daily
          if [ "$HOUR" = "00" ]; then
            call_api "$BASE_URL/api/v1/trigger/story/image" "Story"
          fi

          # WEEKLY reel (Sunday)
          if [ "$WEEKDAY" = "7" ] && [ "$HOUR" = "00" ]; then
            call_api "$BASE_URL/api/v1/trigger/reel" "Reel"
          fi

          # MONTHLY story reel
          if [ "$DAY" = "01" ] && [ "$HOUR" = "00" ]; then
            call_api "$BASE_URL/api/v1/trigger/story/reel" "Story Reel"
          fi

          echo "Done"
