name: Instagram Automation

on:
  schedule:
    - cron: '0 * * * *'   # Run once per hour, at :00
  workflow_dispatch:

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APIs based on time conditions
        env:
          BASE_URL: ${{ secrets.AUTOMATION_BASE_URL }}
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%d)

          echo "Current Day: $DAY, Hour: $HOUR"

          call_api_with_retry() {
            local endpoint="$1"
            local api_name="$2"
            local max_attempts=3
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt for $api_name..."
              local status_code=$(curl -s -w "%{http_code}" -o /dev/null -m 300 "$endpoint")

              if [ "$status_code" = "200" ]; then
                echo "$api_name SUCCESS"
                return 0
              else
                echo "$api_name failed with status: $status_code"
                [ $attempt -lt $max_attempts ] && sleep 60
              fi
              attempt=$((attempt + 1))
            done

            echo "$api_name FAILED after $max_attempts attempts"
            return 1
          }

          # Story Video: Monthly on 1st at 03 (must come before Comments check)
          if [ "$DAY" = "01" ] && [ "$HOUR" = "03" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/video" "Story Video" || exit 1

          # Comments: Every 3 hours
          elif [ "$HOUR" = "00" ] || [ "$HOUR" = "03" ] || [ "$HOUR" = "06" ] || \
               [ "$HOUR" = "09" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "15" ] || \
               [ "$HOUR" = "18" ] || [ "$HOUR" = "21" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/comments" "Comments" || exit 1

          # Feed Image: 01 and 13
          elif [ "$HOUR" = "01" ] || [ "$HOUR" = "13" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/feed/image" "Feed Image" || exit 1

          # Story Image: Daily at 02
          elif [ "$HOUR" = "02" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/image" "Story Image" || exit 1

          else
            echo "No task scheduled for hour $HOUR"
          fi
