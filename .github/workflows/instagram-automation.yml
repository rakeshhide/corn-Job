name: Instagram Automation

on:
  schedule:
    # Comments → every 3 hours
    - cron: '0 */3 * * *'

    # Feed Image → daily at 01:00 & 13:00 IST
    - cron: '30 19,7 * * *'   # (UTC = IST -5:30)

    # Story Image → daily at 02:00 IST
    - cron: '30 20 * * *'

    # Story Video → 1st day of month at 03:00 IST
    - cron: '30 21 1 * *'

  workflow_dispatch:

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger APIs
        env:
          BASE_URL: "https://instagram-automation-g7b4.onrender.com"
        run: |
          set -euo pipefail

          IST_HOUR=$(TZ="Asia/Kolkata" date +%H)
          IST_DAY=$(TZ="Asia/Kolkata" date +%d)

          echo "========================================"
          echo " Instagram Automation Started"
          echo " IST Time -> Day: $IST_DAY | Hour: $IST_HOUR"
          echo "========================================"

          # Retry function
          call_api_with_retry() {
            local endpoint="$1"
            local name="$2"
            local max=3
            local attempt=1
            local status

            echo ""
            echo ">>> Running: $name"

            while [ $attempt -le $max ]; do
              echo "Attempt $attempt..."

              status=$(curl -s -w "%{http_code}" -o /dev/null -m 300 "$endpoint")

              echo "Status: $status"

              if [ "$status" = "200" ]; then
                echo "✅ $name SUCCESS"
                return 0
              fi

              echo "❌ Failed attempt $attempt"
              sleep 60
              attempt=$((attempt+1))
            done

            echo "🚨 $name FAILED"
            return 1
          }

          # Logic based on IST
          
          # 1. Story Video (Monthly)
          if [ "$IST_DAY" = "01" ] && [ "$IST_HOUR" = "03" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/video" "Story Video"
          fi

          # 2. Comments (every 3 hours)
          if [[ "$IST_HOUR" =~ ^(00|03|06|09|12|15|18|21)$ ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/comments" "Comments"
          fi

          # 3. Feed Image
          if [[ "$IST_HOUR" = "01" || "$IST_HOUR" = "13" ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/feed/image" "Feed Image"
          fi

          # 4. Story Image
          if [[ "$IST_HOUR" = "02" ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/image" "Story Image"
          fi

          echo ""
          echo "========================================"
          echo " Job Complete"
          echo "========================================"
