name: Instagram Automation
on:
  schedule:
    # Comments - har 3 ghante IST (UTC mein offset)
    - cron: '30 2 * * *'    # IST 08:00
    - cron: '30 5 * * *'    # IST 11:00
    - cron: '30 8 * * *'    # IST 14:00
    - cron: '30 11 * * *'   # IST 17:00
    - cron: '30 14 * * *'   # IST 20:00
    - cron: '30 15 * * *'   # IST 21:00 ✅ Comments
    - cron: '30 18 * * *'   # IST 00:00
    - cron: '30 21 * * *'   # IST 03:00
    # Feed Image
    - cron: '30 19 * * *'   # IST 01:00
    - cron: '30 7 * * *'    # IST 13:00
    # Story Image
    - cron: '30 20 * * *'   # IST 02:00
    # Story Video
    - cron: '30 21 1 * *'   # IST 03:00, 1st of month
  workflow_dispatch:

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger APIs
        env:
          BASE_URL: "https://instagram-automation-g7b4.onrender.com"
        run: |
          set -euo pipefail
          IST_HOUR=$(TZ="Asia/Kolkata" date +%H)
          IST_MIN=$(TZ="Asia/Kolkata" date +%M)
          IST_DAY=$(TZ="Asia/Kolkata" date +%d)
          echo "IST Time -> Day: $IST_DAY | Hour: $IST_HOUR | Min: $IST_MIN"

          call_api_with_retry() {
            local endpoint="$1"
            local name="$2"
            local max=3
            local attempt=1
            local status
            echo ">>> Running: $name"
            while [ $attempt -le $max ]; do
              echo "Attempt $attempt..."
              status=$(curl -s -w "%{http_code}" -o /dev/null -m 300 "$endpoint")
              echo "Status: $status"
              if [ "$status" = "200" ]; then
                echo "✅ $name SUCCESS"
                return 0
              fi
              echo "❌ Failed attempt $attempt"
              sleep 60
              attempt=$((attempt+1))
            done
            echo "🚨 $name FAILED"
            return 1
          }

          # Story Video (1st of month, IST 03:xx)
          if [ "$IST_DAY" = "01" ] && [ "$IST_HOUR" = "03" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/video" "Story Video"
          fi

          # Comments (IST 00,03,06,09,12,15,18,21)
          if [[ "$IST_HOUR" =~ ^(00|03|06|09|12|15|18|21)$ ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/comments" "Comments"
          fi

          # Feed Image (IST 01 or 13)
          if [[ "$IST_HOUR" = "01" || "$IST_HOUR" = "13" ]]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/feed/image" "Feed Image"
          fi

          # Story Image (IST 02)
          if [ "$IST_HOUR" = "02" ]; then
            call_api_with_retry "$BASE_URL/api/v1/trigger/story/image" "Story Image"
          fi

          echo "Job Complete"
